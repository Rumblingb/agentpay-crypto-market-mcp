        type: string
        description: >-
          AgentPay Pro key for unlimited usage. Get yours at
          https://buy.stripe.com/5kQ3cxflRabW9PW1AD1oI0r
        default: ""
  commandFunction:
    type: python
    path: server.py
    args:
      - --pro-key
      - ${proKey}
